version: "3.9"

services:
  db:
    image: pgvector/pgvector:pg16
    container_name: banking-assistant-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME:-banking_assistant}
      POSTGRES_USER: ${DB_USER:-banking_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-banking_pass}
    volumes:
      - db_data:/var/lib/postgresql/data
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-banking_user} -d ${DB_NAME:-banking_assistant}"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - banking-net

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: banking-assistant-backend
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    links:
      - db:db
    environment:
      DB_HOST: db
      DB_PORT: 5432
      DB_NAME: ${DB_NAME:-banking_assistant}
      DB_USER: ${DB_USER:-banking_user}
      DB_PASSWORD: ${DB_PASSWORD:-banking_pass}
      JWT_SECRET: ${JWT_SECRET:-change-this-super-secret-key-in-production-min-256-bits-long}
      JWT_EXPIRATION_MS: ${JWT_EXPIRATION_MS:-86400000}
      CHAT_SESSION_TIMEOUT_MIN: ${CHAT_SESSION_TIMEOUT_MIN:-60}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_BASE_URL: ${OPENAI_BASE_URL:-https://api.openai.com/v1}
      OPENAI_CHAT_MODEL: ${OPENAI_CHAT_MODEL:-gpt-4o-mini}
      OPENAI_EMBEDDING_MODEL: ${OPENAI_EMBEDDING_MODEL:-text-embedding-3-small}
      OPENAI_EMBEDDING_DIM: ${OPENAI_EMBEDDING_DIM:-1536}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost:4200,http://localhost:8081}
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/actuator/health"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks:
      - banking-net

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: banking-assistant-frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "8081:80"
    networks:
      - banking-net

volumes:
  db_data:

networks:
  banking-net:
    driver: bridge
