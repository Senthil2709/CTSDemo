server:
  port: 9090

spring:
  application:
    name: banking-assistant-backend

  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:banking_assistant}
    username: ${DB_USER:banking_user}
    password: ${DB_PASSWORD:banking_pass}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        jdbc:
          time_zone: UTC
    open-in-view: false

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

  # ─── Spring AI: OpenAI (used by MCP host to drive tool selection) ───
  ai:
    openai:
      api-key: ${OPENAI_API_KEY:OFFLINE}
      chat:
        options:
          model: ${OPENAI_CHAT_MODEL:gpt-4o-mini}

    # ─── Spring AI: MCP Client (host → server over stdio) ───
    mcp:
      client:
        enabled: false
        type: sync
        stdio:
          connections:
            bank-audit:
              # Same fat-jar re-launched with mcp-server profile acts as the stdio server
              command: java
              args:
                - -jar
                - ${MCP_SERVER_JAR:target/banking-assistant-backend-1.0.0.jar}
                - --spring.profiles.active=mcp-server


app:
  jwt:
    secret: ${JWT_SECRET:change-this-super-secret-key-in-production-min-256-bits-long}
    expiration-ms: ${JWT_EXPIRATION_MS:86400000}   # 24h

  chat:
    session-inactivity-minutes: ${CHAT_SESSION_TIMEOUT_MIN:60}

  openai:
    api-key: ${OPENAI_API_KEY:}
    base-url: ${OPENAI_BASE_URL:https://api.openai.com/v1}
    chat-model: ${OPENAI_CHAT_MODEL:gpt-4o-mini}
    embedding-model: ${OPENAI_EMBEDDING_MODEL:text-embedding-3-small}
    embedding-dimensions: ${OPENAI_EMBEDDING_DIM:1536}

  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:4200}


logging:
  level:
    root: INFO
    com.bankingassistant: DEBUG