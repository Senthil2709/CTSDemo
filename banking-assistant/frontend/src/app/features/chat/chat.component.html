<div class="section-eyebrow">AI Multi-Agent Assistant</div>
<h1 style="font-size:1.5rem;">Ask the assistant</h1>
<p style="color: var(--ink-600); margin-bottom:1rem;">Account questions, loan eligibility, policy lookups, and financial planning - all routed automatically.</p>

<div class="chat-shell">
  <div class="chat-messages">
    <div *ngFor="let m of messages"
         class="chat-bubble"
         [class.user]="m.sender === 'USER'"
         [class.assistant]="m.sender === 'ASSISTANT' && !m.blocked"
         [class.blocked]="m.blocked">
      <ng-container *ngIf="!m.pending">{{ m.content }}</ng-container>
      <ng-container *ngIf="m.pending">
        <span class="spinner-ledger" style="border-color: rgba(31,111,92,0.3); border-top-color: var(--ledger-green);"></span>
        thinking...
      </ng-container>
    </div>
    <div #scrollAnchor></div>
  </div>

  <div class="px-3 pb-2" *ngIf="messages.length <= 1">
    <div class="d-flex flex-wrap gap-2">
      <button *ngFor="let p of suggestedPrompts" class="btn btn-sm btn-outline-secondary" (click)="useSuggested(p)">{{ p }}</button>
    </div>
  </div>

  <div class="chat-input-row">
    <input type="text" class="form-control" placeholder="Type your question..."
           [(ngModel)]="draft" (keydown.enter)="send()" [disabled]="sending">
    <button class="btn btn-ledger" (click)="send()" [disabled]="sending || !draft.trim()">
      <i class="bi bi-send"></i> Send
    </button>
  </div>
</div>
