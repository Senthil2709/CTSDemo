<div class="auth-shell">
  <div class="auth-card">
    <div class="auth-brand">
      <div class="brand-mark" style="background: var(--ledger-green);">L</div>
      <div>
        <div style="font-family: var(--font-display); font-weight:600; font-size:1.15rem; color: var(--ink-navy);">Ledger AI</div>
        <div style="font-size:0.75rem; color: var(--ink-600); text-transform:uppercase; letter-spacing:0.06em;">Banking Assistant</div>
      </div>
    </div>

    <h2 style="font-size:1.3rem;">Open your account</h2>
    <p style="color: var(--ink-600); margin-bottom:1.4rem;">A few details and you're set up as a customer.</p>

    <form [formGroup]="form" (ngSubmit)="submit()">
      <div class="mb-3">
        <label class="form-label">Full name</label>
        <input type="text" class="form-control" formControlName="fullName" placeholder="Jane Doe">
      </div>
      <div class="mb-3">
        <label class="form-label">Username</label>
        <input type="text" class="form-control" formControlName="username" placeholder="At least 4 characters">
      </div>
      <div class="mb-3">
        <label class="form-label">Email</label>
        <input type="email" class="form-control" formControlName="email" placeholder="jane@example.com">
      </div>
      <div class="mb-3">
        <label class="form-label">Phone number (optional)</label>
        <input type="text" class="form-control" formControlName="phoneNumber">
      </div>
      <div class="mb-3">
        <label class="form-label">Password</label>
        <input type="password" class="form-control" formControlName="password" placeholder="At least 8 characters">
      </div>

      <div class="alert alert-danger py-2" *ngIf="errorMessage">{{ errorMessage }}</div>

      <button type="submit" class="btn btn-ledger w-100 mb-3" [disabled]="loading">
        <span class="spinner-ledger me-2" *ngIf="loading"></span>
        Create account
      </button>
    </form>

    <div style="font-size:0.85rem;">Already have an account? <a routerLink="/login">Sign in</a></div>
  </div>
</div>
