<ng-container *ngIf="authService.isLoggedIn; else authOnly">
  <div class="app-shell">
    <app-navbar></app-navbar>
    <div class="app-main">
      <div class="app-topbar">
        <div class="section-eyebrow">Banking Assistant</div>
        <span class="tier-badge" *ngIf="authService.currentAuth">{{ authService.currentAuth?.role }}</span>
      </div>
      <div class="app-content">
        <router-outlet></router-outlet>
      </div>
    </div>
  </div>
</ng-container>

<ng-template #authOnly>
  <router-outlet></router-outlet>
</ng-template>
