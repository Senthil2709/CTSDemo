
services:
  backend:
    build: ./banking-assistant/backend
    container_name: banking-assistant-backend
    restart: unless-stopped
    # host network lets the container reach localhost:5432 (host PostgreSQL)
    # without any pg_hba.conf or listen_addresses changes
    network_mode: host
    environment:
      DB_HOST: localhost
      DB_PORT: 5432
      DB_NAME: ${DB_NAME:-banking_assistant}
      DB_USER: ${DB_USER:-banking_user}
      DB_PASSWORD: ${DB_PASSWORD:-banking_pass}
      JWT_SECRET: ${JWT_SECRET:-change-this-super-secret-key-in-production-min-256-bits-long}
      JWT_EXPIRATION_MS: ${JWT_EXPIRATION_MS:-86400000}
      CHAT_SESSION_TIMEOUT_MIN: ${CHAT_SESSION_TIMEOUT_MIN:-60}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-OFFLINE}
      OPENAI_BASE_URL: ${OPENAI_BASE_URL:-https://api.openai.com/v1}
      OPENAI_CHAT_MODEL: ${OPENAI_CHAT_MODEL:-gpt-4o-mini}
      OPENAI_EMBEDDING_MODEL: ${OPENAI_EMBEDDING_MODEL:-text-embedding-3-small}
      OPENAI_EMBEDDING_DIM: ${OPENAI_EMBEDDING_DIM:-1536}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost:4200,http://localhost:8082}
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:9090/actuator/health"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 60s

  frontend:
    build:
      context: ./banking-assistant/frontend
      dockerfile: Dockerfile
    container_name: banking-assistant-frontend
    restart: unless-stopped
    ports:
      - "8082:80"
    # backend is on host network (port 9090 on the host), so nginx proxies to host gateway
    extra_hosts:
      - "backend:172.17.0.1"
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - banking-net

networks:
  banking-net:
    driver: bridge
